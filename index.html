<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PDF Generator</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; max-width: 600px; margin: auto; }
      label { display: block; margin-top: 12px; font-weight: bold; }
      input, select { width: 100%; padding: 6px; margin-top: 4px; }
      button { margin-top: 16px; padding: 10px 20px; font-size: 16px; }
    </style>
  </head>
  <body>
    <h1>Generate PDF from Google Doc</h1>
    <form id="pdfForm">
      <label for="docUrl">Google Doc URL</label>
      <input type="url" id="docUrl" name="docUrl" required placeholder="https://docs.google.com/...">

      <label for="font">Font</label>
      <select id="font" name="font">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Calibri">Calibri</option>
        <option value="Verdana">Verdana</option>
      </select>

      <label for="baseSize">Base font size (px)</label>
      <input type="number" id="baseSize" name="baseSize" value="12" min="6" max="72">

      <label for="ratio">Title size ratio</label>
      <input type="number" step="0.1" id="ratio" name="ratio" value="1.5">

      <label for="colorTitle">Title color</label>
      <input type="color" id="colorTitle" name="colorTitle" value="#1A2B3C">

      <label for="colorText">Body color</label>
      <input type="color" id="colorText" name="colorText" value="#333333">

      <button type="submit">Generate PDF</button>
    </form>

    <div id="result" style="margin-top:20px;"></div>

    <script>
      const form = document.getElementById('pdfForm');
      const result = document.getElementById('result');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        result.innerHTML = "Generating PDF… ⏳";

        const formData = new FormData(form);
        const params = new URLSearchParams(formData).toString();
        
        try {
          const response = await fetch("https://script.google.com/macros/s/AKfycbwyE9uDjueSdM6NlhxY3Jtg3YG4PKIixf0ypSg9fxV-svfEqQGzFr4KI_2Jjgs57OK1Mg/exec",
            method: "POST",
            body: params,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          });

          const text = await response.text();
          result.innerHTML = text;
        } catch (err) {
          result.innerHTML = "Error: " + err.message;
        }
      });
    </script>
  </body>
</html>
