<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Generate PDF</title>
  </head>
  <body style="font-family: Arial, sans-serif; padding: 24px;">
    <h2>Generate PDF from Google Doc</h2>
    <form method="POST" action="https://script.google.com/macros/s/AKfycbyBDX9X9AhGt8AuXjOf61B0WDvru81L3Jdmmr5Ul6x6zIa8H3unxUzDBDHHfVe_tNqvTQ/exec" target="_blank">
      <label>Google Doc URL</label><br>
      <input name="docUrl" required placeholder="https://docs.google.com/document/d/..."><br><br>

      <label>Font</label><br>
      <input name="font" placeholder="Arial"><br><br>

      <label>Base Size</label><br>
      <input name="baseSize" type="number" placeholder="12"><br><br>

      <label>Ratio (Title Size)</label><br>
      <input name="ratio" type="number" step="0.1" placeholder="1.5"><br><br>

      <label>Title Color</label><br>
      <input name="colorTitle" placeholder="#1A2B3C"><br><br>

      <label>Text Color</label><br>
      <input name="colorText" placeholder="#333333"><br><br>

      <button type="submit">Generate PDF</button>
    </form>
  </body>
</html>
