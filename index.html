<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branded PDF Generator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    label { display:block; margin: 16px 0 6px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; font-size: 16px; }
    textarea { min-height: 220px; }
    button { margin-top: 16px; padding: 12px 16px; font-size: 16px; cursor: pointer; }
    .hint { color: #555; font-size: 14px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Generate a branded PDF</h1>
  <p>Fill in your content, choose font, colors, base size & ratio, then generate the PDF.</p>

  <form method="POST" action="https://script.google.com/macros/s/AKfycby3DuuPpmvdETRteGH7LSmnR-VkyM-yEClp54rUgeLQMT60Zj-oQe_vxpM5FnIiCw2biA/exec" target="_blank">
    
    <label for="title">Title</label>
    <input id="title" name="title" required placeholder="Ex: Q1 Report" />

    <label for="body">Body</label>
    <textarea id="body" name="body" required placeholder="Write your text here..."></textarea>
    <div class="hint">Use blank lines to separate paragraphs.</div>

    <label for="font">Font</label>
    <input id="font" name="font" placeholder="Ex: Arial, Roboto" />

    <label for="baseSize">Base font size (pt)</label>
    <input id="baseSize" name="baseSize" type="number" placeholder="12" />

    <label for="ratio">Typographic ratio</label>
    <input id="ratio" name="ratio" type="number" step="0.1" placeholder="1.5" />

    <label for="colorTitle">Color - Title</label>
    <input id="colorTitle" name="colorTitle" type="color" value="#1A2B3C" />

    <label for="colorSubtitle">Color - Subtitle</label>
    <input id="colorSubtitle" name="colorSubtitle" type="color" value="#2E8B57" />

    <label for="colorAccent">Color - Accent</label>
    <input id="colorAccent" name="colorAccent" type="color" value="#F4A261" />

    <label for="colorText">Color - Body Text</label>
    <input id="colorText" name="colorText" type="color" value="#333333" />

    <button type="submit">Generate PDF</button>
  </form>

  <p class="hint">The PDF will open in a new tab.</p>
</body>
</html>
